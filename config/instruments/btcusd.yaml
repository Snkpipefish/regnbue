# Bitcoin — håndtilpasset, fundamentalt (ingen generisk pris-trend).
# Krypto har det svakeste fundamentale grunnlaget (i stor grad flyt/narrativ); de mest
# forsvarlige driverne er makro-likviditet (dollar), risk-regime og institusjonell posisjonering.
#   1) Bred dollar: svak USD = løs likviditet = bullish risk/krypto.
#   2) Risk-sentiment (VIX): risk-off = krypto (høy-beta) selges = bearish.
#   3) Spekulant-posisjonering (CME Bitcoin): trend-bekreftende.
# NB: VIX er IKKE sirkulær her (aksje-avledet, ikke krypto). Spot-BTC-ETF-flyt mangler vi data for.
id: BTCUSD
ticker: Bitcoin
asset_class: crypto
drivers:
  # Bred handelsvektet dollar opp = strammere likviditet = bearish (bull_when low). Dyp (2006→).
  - name: momentum
    weight: 0.30
    params: {series: DTWEXBGS, horizon_days: 21, bull_when: low}
  # Risk-sentiment: høy VIX = risk-off = krypto selges = bearish (bull_when low). Dyp (2010→).
  - name: level_percentile
    weight: 0.30
    params: {series: VIXCLS, lookback_days: 504, bull_when: low}
  # Spekulant netto-posisjonering (CME Bitcoin), trend-bekreftende. 2018→.
  - name: cot_spec_net_percentile
    weight: 0.40
    params: {market: BTCUSD, lookback_weeks: 156, bull_when: high}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, band: 0.10, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
