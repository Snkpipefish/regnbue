# Kobber ("Dr. Copper") — håndtilpasset, fundamentalt (ingen generisk pris-trend).
# Årsakskjede: kobber er et rent industri-/vekst-barometer (Kina-etterspørsel, bygg, elektrifisering).
#   1) Bred dollar: svak USD = bullish (USD-priset råvare).
#   2) Kredittspread (HY OAS): trange spreads = risk-on/vekst = bullish kobber.
#   3) Spekulant-posisjonering (COMEX Copper): trend-bekreftende.
#   4) Risk-sentiment (VIX): risk-off = bearish industrimetall.
# NB: kobber-pris på Skilling er kun ~2 år (2023→) og COT ~3 år (2022→), og HY-spread-serien
#     (BAMLH0A0HYM2) leverer kun fra 2023 på FRED nå → base-rate-gaten vil avvise ærlig (korrekt).
#     LME/SHFE-lager (sterk tilbuds-driver) mangler vi dyp data for → utelatt.
id: Copper
ticker: COPPER
asset_class: metals
drivers:
  # Bred handelsvektet dollar opp = motvind. 21d-momentum. Dyp (2006→).
  - name: momentum
    weight: 0.35
    params: {series: DTWEXBGS, horizon_days: 21, bull_when: low}
  # HY-kredittspread: lav (trang) = risk-on/vekst = bullish (bull_when low). Grunn (2023→).
  - name: level_percentile
    weight: 0.25
    params: {series: BAMLH0A0HYM2, lookback_days: 504, bull_when: low}
  # Spekulant netto-posisjonering (COMEX Copper), trend-bekreftende. Grunn (2022→).
  - name: cot_spec_net_percentile
    weight: 0.25
    params: {market: Copper, lookback_weeks: 156, bull_when: high}
  # Risk-sentiment: høy VIX = risk-off = bearish (bull_when low). Dyp (2010→).
  - name: level_percentile
    weight: 0.15
    params: {series: VIXCLS, lookback_days: 504, bull_when: low}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, band: 0.10, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
