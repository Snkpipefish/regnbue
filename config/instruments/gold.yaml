# Gull — håndtilpasset, fundamentalt (ingen generisk pris-trend).
# Årsakskjede (research 2026-05): gull er et ikke-rentebærende, dollar-priset trygg-havn-aktivum.
#   1) Realrente (10y) DOMINERER: lav/fallende realrente = lav alternativkostnad = bullish.
#   2) Bred dollar: svak USD = mer kjøpekraft utenfor US = bullish.
#   3) ETF-flyt (GLD tonn): direkte fysisk investerings-etterspørsel; inn-flyt = bullish.
#   4) Spekulant-posisjonering (COT): trend-bekreftende.
# Sentralbank-kjøp er en sterk driver men har ingen gratis daglig serie → utelatt.
id: Gold
ticker: GOLD            # Skilling-ticker (NIVÅ-feed)
asset_class: metals
drivers:
  # Realrente = DGS10 − T10YIE (10y TIPS-implisitt). Lav realrente = bullish. Dyp (2003→).
  - name: series_spread_percentile
    weight: 0.35
    params: {minuend: DGS10, subtrahend: T10YIE, lookback_days: 504, bull_when: low}
  # Bred handelsvektet dollar (DTWEXBGS) opp = motvind. 21d-momentum. Dyp (2006→).
  - name: momentum
    weight: 0.20
    params: {series: DTWEXBGS, horizon_days: 21, bull_when: low}
  # GLD ETF-beholdning (tonn): fysisk investerings-flyt, inn-flyt = bullish. Dyp (2004→).
  - name: etf_flow
    weight: 0.25
    params: {ticker: gld, horizon_days: 63, bull_when: high}
  # Spekulant netto-posisjonering (trend-bekreftende). Dyp (2010→).
  - name: cot_spec_net_percentile
    weight: 0.20
    params: {market: Gold, lookback_weeks: 156, bull_when: high}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, band: 0.10, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
