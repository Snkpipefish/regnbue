id: Gold
ticker: GOLD            # Skilling-ticker (NIVÅ-feed)
asset_class: metals
# Lean fingerprint — kun drivere som faktisk beveger gull, regnet på seedet/fetchet data.
drivers:
  # Realrente = DGS10 − T10YIE. Gull er bullish når realrenta er LAV.
  - name: series_spread_percentile
    weight: 0.30
    params: {minuend: DGS10, subtrahend: T10YIE, lookback_days: 504, bull_when: low}
  # Bred dollar (DTWEXBGS) opp = motvind for gull.
  - name: momentum
    weight: 0.25
    params: {series: DTWEXBGS, horizon_days: 21, bull_when: low}
  # Spekulant netto-posisjonering (trend-bekreftende).
  - name: cot_spec_net_percentile
    weight: 0.20
    params: {market: Gold, lookback_weeks: 156, bull_when: high}
  # Trend på Skilling-feeden.
  - name: price_vs_sma
    weight: 0.25
    params: {symbol: GOLD, window: 200, tf: D1}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, similarity: 0.15, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
