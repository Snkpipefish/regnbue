# Mais — håndtilpasset, fundamentalt (ingen generisk pris-trend).
# Årsakskjede (research 2026-05): mais drives av US-kornbelte-vær i vekstsesongen (begge
# ekstremer skader: tørke OG styrtregn), etanol-etterspørsel (~40% av US-mais → etanol),
# eksport-konkurranseevne (dollar) og posisjonering.
#   1) Kornbelte-vær (mai–sep): tørke/styrtregn rundt pollinering (juli) = tilbudssjokk = bullish.
#   2) Etanol/olje: høy råolje = etanol-incentiv = mais-etterspørsel = bullish.
#   3) Bred dollar: sterk USD = US-mais mindre konkurransedyktig på eksport = bearish.
#   4) Spekulant-posisjonering (CBOT Corn): trend-bekreftende.
id: Corn
ticker: Corn
asset_class: grains
drivers:
  # Kornbelte-nedbør (begge ekstremer), KUN i vekstsesongen (mai–sep). Dyp (2000→).
  - name: rainfall_anomaly
    weight: 0.30
    params: {region: us_cornbelt, window_days: 30, active_months: [5, 6, 7, 8, 9]}
  # Råolje-nivå = etanol-incentiv (mais-etterspørsel). Høy = bullish. Dyp (1990→).
  - name: level_percentile
    weight: 0.25
    params: {series: DCOILWTICO, lookback_days: 504, bull_when: high}
  # Bred handelsvektet dollar opp = svakere eksport = bearish (bull_when low). Dyp (2006→).
  - name: momentum
    weight: 0.20
    params: {series: DTWEXBGS, horizon_days: 21, bull_when: low}
  # Spekulant netto-posisjonering (CBOT Corn), trend-bekreftende. Dyp (2010→).
  - name: cot_spec_net_percentile
    weight: 0.25
    params: {market: Corn, lookback_weeks: 156, bull_when: high}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, band: 0.10, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
