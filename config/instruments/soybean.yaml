# Soyabønner — håndtilpasset, fundamentalt (ingen generisk pris-trend).
# Årsakskjede: soya drives av US-kornbelte-vær (fyllingsfasen aug), eksport (Kina = stor kjøper,
# dollar-konkurranseevne) og posisjonering.
#   1) Kornbelte-vær (jun–sep): tørke/styrtregn rundt belgsetting (aug) = tilbudssjokk = bullish.
#   2) Bred dollar: sterk USD = US-soya mindre konkurransedyktig (vs Brasil) = bearish.
#   3) Spekulant-posisjonering (CBOT Soybean): trend-bekreftende.
# NB: Kina-etterspørsel er den store svingfaktoren men mangler ren daglig serie → utelatt.
id: Soybean
ticker: Soybean
asset_class: grains
drivers:
  # Kornbelte-nedbør (begge ekstremer), KUN vekstsesong (jun–sep). Dyp (2000→).
  - name: rainfall_anomaly
    weight: 0.40
    params: {region: us_cornbelt, window_days: 30, active_months: [6, 7, 8, 9]}
  # Bred handelsvektet dollar opp = svakere eksport = bearish (bull_when low). Dyp (2006→).
  - name: momentum
    weight: 0.30
    params: {series: DTWEXBGS, horizon_days: 21, bull_when: low}
  # Spekulant netto-posisjonering (CBOT Soybean), trend-bekreftende. Dyp (2010→).
  - name: cot_spec_net_percentile
    weight: 0.30
    params: {market: Soybean, lookback_weeks: 156, bull_when: high}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, band: 0.10, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
