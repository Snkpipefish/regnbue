# USDJPY — håndtilpasset, fundamentalt (ingen generisk pris-trend).
# Årsakskjede: USDJPY domineres av US−JP rentedifferanse (carry); yen er trygg-havn.
# USD-base: sterk USD / høy diff = par OPP. (Motsatt fortegn av *USD-parene.)
#   1) US−JP 10y rentespread: bred (høy) = USDJPY OPP (bull_when high) — den dominerende driveren.
#   2) Front-end Fed-forventninger (US 2y): stigende = USDJPY opp (bull_when high).
#   3) Spekulant-posisjonering (CME Japanese Yen): COT long JPY = USDJPY ned (bull_when low).
#   4) Risk-sentiment (VIX): risk-off = yen trygg-havn styrkes = USDJPY NED (bull_when low).
id: USDJPY
ticker: USDJPY
asset_class: fx
drivers:
  # US−JP 10y rentespread. Bred (høy) = USDJPY opp (bull_when high). Dyp (1990→).
  - name: series_spread_percentile
    weight: 0.40
    params: {minuend: DGS10, subtrahend: IRLTLT01JPM156N, lookback_days: 504, bull_when: high}
  # US 2y-momentum (Fed-forventninger). Stigende = USDJPY opp (bull_when high). Dyp (1976→).
  - name: momentum
    weight: 0.20
    params: {series: DGS2, horizon_days: 21, bull_when: high}
  # Spekulant netto-posisjonering (CME Japanese Yen): long JPY = USDJPY ned (bull_when low). 2016→.
  - name: cot_spec_net_percentile
    weight: 0.15
    params: {market: USDJPY, lookback_weeks: 156, bull_when: low}
  # Risk-sentiment: høy VIX = risk-off = yen styrkes = USDJPY ned (bull_when low). Dyp (2010→).
  - name: level_percentile
    weight: 0.25
    params: {series: VIXCLS, lookback_days: 504, bull_when: low}
grade_thresholds: {A_plus: 0.55, A: 0.40, B: 0.25}
base_rate: {horizon_days: 30, band: 0.10, min_effective_n: 30,
            min_hit_rate_pct: 55, min_expectancy_r: 0.3}
