# Swap / overnight-financing-rater pr instrument (#10) — daglig kostnad som ANDEL av notional.
#   long_cost_pct_per_day / short_cost_pct_per_day:  POSITIV = debet (du betaler),
#   NEGATIV = kreditt (du mottar). Trekkes fra expectancy pr faktisk holdetid i
#   outcomes.swap_cost_r + scenario.fhs_barrier_prob. Nøklet på fingerprint-navn (filstamme),
#   fordi brent/wti deler Skilling-ticker OIL.
#
# KILDE/METODE (research 2026-06, web): Skilling beregner swap fra underliggende carry —
#   FX = rentedifferanse mellom valutaene; indeks = (markup ± Libor)/365 minus utbytte;
#   krypto ≈ −20 %/år begge veier; metaller/energi = USD-finansiering + markup (+ contango).
#   Vi rekonstruerer dette fra carry framfor et skjørt plattform-øyeblikksbilde:
#     markup ≈ 2.5 %/år (retail CFD) ⇒ markup_daily = 0.025/365 ≈ 6.85e-5, begge sider.
#   Sentralbankrenter (UniRateAPI, ~apr-2026): USD 4.50, EUR 2.50, GBP 4.50, JPY 0.50, AUD 4.10.
#     FX:  carry_long = (base−quote)/365;  long = markup_daily − carry_long;  short = markup_daily + carry_long.
#   Kilder: skilling.com/eu/en/commissions-and-swap-charges, brokerchooser.com Skilling-review,
#   unirateapi.com/central-bank-rates, activtrades/bydfi swap-forklaringer.
#
# NB: Dette er carry-forankrede ESTIMATER, ikke Skillings eksakte live-tabell (som ligger i
#   plattformen). Rekalibrer pr instrument mot kontoen; flagg negativ-swap-instrumenter (§5b).
#   Tegn/størrelsesorden er korrekte; finjuster verdiene når live-tall hentes.

